name: C++ CI Serial Programs base
on:
  workflow_call:
    inputs:
      os: 
        required: true
        type: string

      compiler:
        required: true
        type: string

      upload-build:
        type: boolean
        default: false

      run-tests:
        type: boolean
        default: false

      run-clang-query:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{inputs.os}}

    steps:
    - name: Set variables
      shell: bash
      run: |
        if [[ "${{inputs.compiler}}" == "clang" ]]; then
          if [[ "${{inputs.os}}" == windows* ]]; then
            CMAKE_ADDITIONAL_FLAGS="-T ClangCL"
          elif [[ "${{inputs.os}}" == ubuntu* ]]; then
            CMAKE_ADDITIONAL_FLAGS="-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"
          fi
        fi
        echo "CMAKE_ADDITIONAL_FLAGS=$CMAKE_ADDITIONAL_FLAGS" >> $GITHUB_ENV

        if [[ "${{inputs.os}}" == windows* ]]; then
          UPLOAD_FOLDER="Arduino-Source/SerialPrograms/bin/RelWithDebInfo"
        else
          UPLOAD_FOLDER="Arduino-Source/SerialPrograms/bin"
        fi
        echo "UPLOAD_FOLDER=$UPLOAD_FOLDER" >> $GITHUB_ENV

    - name: Checkout Arduino-Source
      uses: actions/checkout@v6
      with:
        path: 'Arduino-Source'
        submodules: 'recursive'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.2'
        modules: 'qtmultimedia qtserialport'

    - name: Install dependencies (Ubuntu)
      if: startsWith(inputs.os, 'ubuntu')
      run: |
        cd Arduino-Source
        sudo apt update
        sudo apt upgrade
        sudo apt install clang-tools libopencv-dev

        sudo apt install ./3rdPartyBinaries/libdpp-10.0.28-linux-x64.deb

    - name: Install dependencies (Mac)
      if: startsWith(inputs.os, 'mac')
      run: |
        cd Arduino-Source
        brew install opencv onnxruntime

        brew tap-new --no-git PA/libdpp
        FORMULA_DIR="$(brew --repo PA/libdpp)/Formula"
        mkdir -p "$FORMULA_DIR"
        cp 3rdPartyBinaries/libdpp@10.0.28.rb "$FORMULA_DIR/"
        brew install libdpp@10.0.28

    - name: Generate binaries
      run: |
        cd Arduino-Source/SerialPrograms
        mkdir bin
        cd bin
        cmake .. -DQT_MAJOR:STRING=6 ${{env.CMAKE_ADDITIONAL_FLAGS}}
        cmake --build . --config RelWithDebInfo --parallel 10

    - name: Prepare upload build
      if: inputs.upload-build
      shell: bash
      run: |
        echo https://github.com/${{github.repository}}/commit/${{github.sha}} > ${{env.UPLOAD_FOLDER}}/version.txt

    - name: Upload Build
      uses: actions/upload-artifact@v7
      if: inputs.upload-build
      with:
        name: Serial Programs (os=${{inputs.os}} - compiler=${{inputs.compiler}})
        path: ${{env.UPLOAD_FOLDER}}

    - name: Checkout CommandLineTests
      uses: actions/checkout@v6
      if: inputs.run-tests
      with:
        repository: 'PokemonAutomation/CommandLineTests'
        path: 'CommandLineTests'

    - name: Run tests (Windows)
      if: startsWith(inputs.os, 'windows') && inputs.run-tests
      run: |
        cd Arduino-Source/SerialPrograms/bin
        $process = Start-Process -FilePath "./RelWithDebInfo/SerialPrograms.exe" `
                                 -ArgumentList "--command-line-test-mode --command-line-test-folder ../../../CommandLineTests" `
                                 -NoNewWindow -Wait -PassThru
        if ($process.ExitCode -ne 0) {
            Write-Error "Tests failed with exit code $($process.ExitCode)"
            exit 1
        }

    - name: Run tests (Mac)
      if: startsWith(inputs.os, 'mac') && inputs.run-tests
      run: |
        cd Arduino-Source/SerialPrograms/bin
        ./SerialPrograms.app/Contents/MacOS/SerialPrograms --command-line-test-mode --command-line-test-folder ../../../CommandLineTests

    - name: Run clang query
      if: inputs.run-clang-query
      run : |
        cd Arduino-Source

        cat << 'EOF' > query.txt
        set output dump
        match anyOf(
          invocation(
            isExpansionInFileMatching("SerialPrograms/"),
            hasDeclaration(cxxConstructorDecl(ofClass(hasName("std::filesystem::path")))),
            hasArgument(0, hasType(asString("std::string")))
          ).bind("path_error"),
          cxxConstructExpr(
            isExpansionInFileMatching("SerialPrograms/"),
            hasDeclaration(cxxConstructorDecl(ofClass(hasName("ImageViewRGB32")))),
            hasArgument(0, hasType(rValueReferenceType(pointee(hasType(hasName("VideoSnapshot")))))),
            unless(hasAncestor(functionDecl(isInline())))
          ).bind("view_error")
        )
        EOF

        files=$(jq -r '.[].file' SerialPrograms/bin/compile_commands.json)
        echo "$files" | xargs --max-args=50 clang-query -p SerialPrograms/bin/ -f query.txt > clang-query-stdout.txt 2> clang-query-stderr.txt || true

        if [ -s clang-query-stderr.txt ] && grep --quiet --invert-match "Processing file" clang-query-stderr.txt; then
          echo "Clang query encountered an error."
          echo "Check clang-query-stderr.txt below."
          exit 1
        fi

        FOUND_FORBIDDEN=0
        if grep --quiet "Binding for 'path_error'" clang-query-stdout.txt; then
          echo "std::filesystem::path created from std::string. More information https://discord.com/channels/695809740428673034/1462210406616531259/1462567541825339635"
          FOUND_FORBIDDEN=1
        fi
        if grep --quiet "Binding for 'view_error'" clang-query-stdout.txt; then
          echo "ImageViewRGB32 created from VideoSnapshot&& that is stored. It is a dangling pointer as nothing hold the data anymore"
          FOUND_FORBIDDEN=1
        fi

        if [ "$FOUND_FORBIDDEN" -eq 1 ]; then
          echo "Clang query encountered a banned pattern."
          echo "Check clang-query-stdout.txt below."
          exit 1
        fi

        echo "Scan completed successfully with no violations."

    - name: Upload Clang query output
      uses: actions/upload-artifact@v7
      if: inputs.run-clang-query && always()
      with:
        name: Clang query output (compiler=${{inputs.compiler}})
        path: |
          Arduino-Source/SerialPrograms/bin/compile_commands.json
          Arduino-Source/clang-query-stdout.txt
          Arduino-Source/clang-query-stderr.txt